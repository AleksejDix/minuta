name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code to reproduce the issue.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: adapter
    attributes:
      label: Adapter
      options:
        - Native
        - date-fns
        - date-fns-tz
        - Luxon
        - Temporal
        - All adapters
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Minuta version
      placeholder: "1.0.0-beta.1"
    validations:
      required: true

  - type: input
    id: timezone
    attributes:
      label: Timezone (if relevant)
      placeholder: "Europe/Zurich"
